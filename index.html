<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pokopia Dex</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
      background: linear-gradient(to bottom, #1a0033, #2d0052, #1a0033);
      min-height: 100vh;
      color: white;
    }

    /* Header */
    header {
      position: sticky;
      top: 0;
      z-index: 40;
      background: linear-gradient(to bottom, #2d0052, transparent);
      padding-bottom: 1rem;
      padding-top: 1.5rem;
      padding-left: 1rem;
      padding-right: 1rem;
      border-bottom: 1px solid rgba(168, 85, 247, 0.3);
    }

    h1 {
      font-size: 1.875rem;
      font-weight: 900;
      text-align: center;
      letter-spacing: 0.125em;
      background: linear-gradient(135deg, #FF006E, #FFD60A, #3A86FF);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .subtitle {
      color: rgba(196, 181, 253, 0.6);
      text-align: center;
      font-size: 0.75rem;
      margin-top: 0.25rem;
      font-weight: 500;
      letter-spacing: 0.1em;
    }

    /* Main Content */
    main {
      padding-left: 1rem;
      padding-right: 1rem;
      padding-top: 1rem;
      padding-bottom: 120px;
    }

    .tab-content {
      animation: fadeIn 0.3s ease-out;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Pokédex Grid */
    .pokemon-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 1rem;
    }

    .pokemon-card {
      position: relative;
      overflow: hidden;
      border-radius: 0.75rem;
      background: linear-gradient(to bottom right, rgba(168, 85, 247, 0.4), rgba(79, 70, 229, 0.4));
      padding: 1rem;
      border: 1px solid rgba(168, 85, 247, 0.4);
      cursor: pointer;
      transition: all 0.3s;
      text-align: center;
      font-family: inherit;
      color: inherit;
    }

    .pokemon-card:hover {
      border-color: rgba(168, 85, 247, 0.6);
      box-shadow: 0 20px 25px -5px rgba(168, 85, 247, 0.2);
    }

    .pokemon-card:active {
      transform: scale(0.95);
    }

    .pokemon-image {
      font-size: 3.5rem;
      height: 4rem;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 0.5rem;
    }

    .pokemon-name {
      font-weight: 900;
      font-size: 0.875rem;
      color: white;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      margin-bottom: 0.5rem;
    }

    .type-badges {
      display: flex;
      flex-wrap: wrap;
      gap: 0.25rem;
      margin-bottom: 0.5rem;
    }

    .type-badge {
      font-size: 0.75rem;
      font-weight: 700;
      padding: 0.5rem;
      border-radius: 9999px;
    }

    .likes {
      display: flex;
      align-items: center;
      gap: 0.25rem;
      color: rgba(196, 181, 253, 0.8);
      font-size: 0.75rem;
      font-weight: 600;
    }

    /* Habitat Cards */
    .habitat-card {
      width: 100%;
      position: relative;
      overflow: hidden;
      border-radius: 0.5rem;
      background: linear-gradient(to right, rgba(168, 85, 247, 0.3), rgba(79, 70, 229, 0.3));
      padding: 1rem;
      border: 1px solid rgba(168, 85, 247, 0.4);
      transition: all 0.3s;
      cursor: pointer;
      text-align: left;
      font-family: inherit;
      color: inherit;
      margin-bottom: 0.75rem;
    }

    .habitat-card:hover {
      border-color: rgba(168, 85, 247, 0.6);
      box-shadow: 0 10px 15px -3px rgba(168, 85, 247, 0.2);
    }

    .habitat-name {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 1.125rem;
      font-weight: 900;
      color: white;
      margin-bottom: 0.5rem;
    }

    .habitat-pokemon {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      margin-left: 1.5rem;
    }

    .pokemon-item {
      font-size: 0.875rem;
      font-weight: 600;
      color: rgba(196, 181, 253, 0.9);
      display: flex;
      align-items: center;
      gap: 0.25rem;
    }

    .pokemon-item-emoji {
      font-size: 1.5rem;
    }

    /* Search */
    .search-container {
      position: relative;
      margin-bottom: 1rem;
    }

    .search-input {
      width: 100%;
      padding-left: 2.5rem;
      padding-right: 1rem;
      padding-top: 0.75rem;
      padding-bottom: 0.75rem;
      border-radius: 0.5rem;
      background-color: rgba(168, 85, 247, 0.4);
      border: 1px solid rgba(168, 85, 247, 0.4);
      color: white;
      font-size: 1rem;
      font-family: inherit;
      transition: all 0.2s;
    }

    .search-input::placeholder {
      color: rgba(168, 85, 247, 0.5);
    }

    .search-input:focus {
      outline: none;
      border-color: rgba(168, 85, 247, 0.8);
      box-shadow: 0 0 0 2px rgba(168, 85, 247, 0.2);
    }

    .search-icon {
      position: absolute;
      left: 0.75rem;
      top: 50%;
      transform: translateY(-50%);
      color: rgb(168, 85, 247);
      font-size: 1.25rem;
    }

    .no-results {
      text-align: center;
      padding-top: 3rem;
      color: rgba(196, 181, 253, 0.6);
      font-weight: 600;
    }

    /* Detail Page */
    .back-button {
      color: rgb(168, 85, 247);
      background: transparent;
      border: none;
      font-weight: 600;
      font-size: 0.875rem;
      cursor: pointer;
      padding: 0;
      font-family: inherit;
      transition: color 0.2s;
      margin-bottom: 1rem;
    }

    .back-button:hover {
      color: rgb(196, 181, 253);
    }

    .detail-image {
      position: relative;
      border-radius: 1rem;
      background: linear-gradient(to bottom, rgba(168, 85, 247, 0.4), rgba(79, 70, 229, 0.4));
      padding: 2rem;
      border: 1px solid rgba(168, 85, 247, 0.4);
      overflow: hidden;
      text-align: center;
      margin-bottom: 1rem;
    }

    .detail-emoji {
      font-size: 5.625rem;
      margin-bottom: 1rem;
      filter: drop-shadow(0 10px 8px rgba(0, 0, 0, 0.3));
    }

    .detail-name {
      font-size: 1.875rem;
      font-weight: 900;
      color: white;
      margin-bottom: 0.5rem;
    }

    .detail-description {
      color: rgba(196, 181, 253, 0.9);
      font-size: 0.875rem;
      line-height: 1.5;
      max-width: 20rem;
      margin: 0 auto;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.75rem;
      margin-bottom: 1rem;
    }

    .stat-card {
      border-radius: 0.75rem;
      background: linear-gradient(to bottom right, rgba(168, 85, 247, 0.4), rgba(79, 70, 229, 0.4));
      padding: 1rem;
      border: 1px solid rgba(168, 85, 247, 0.4);
    }

    .stat-label {
      font-size: 0.75rem;
      font-weight: 700;
      color: rgba(196, 181, 253, 0.6);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 0.5rem;
    }

    .stat-content {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .stat-value {
      color: white;
      font-weight: 600;
    }

    .abilities-card {
      border-radius: 0.75rem;
      background: linear-gradient(to bottom right, rgba(168, 85, 247, 0.4), rgba(79, 70, 229, 0.4));
      padding: 1rem;
      border: 1px solid rgba(168, 85, 247, 0.4);
      margin-bottom: 1rem;
    }

    .ability-item {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.5rem 0.75rem;
      border-radius: 0.5rem;
      background-color: rgba(168, 85, 247, 0.3);
      border: 1px solid rgba(168, 85, 247, 0.3);
      margin-bottom: 0.5rem;
    }

    .ability-item:last-child {
      margin-bottom: 0;
    }

    .ability-emoji {
      color: #facc15;
      font-size: 0.875rem;
    }

    .ability-name {
      color: white;
      font-weight: 600;
      font-size: 0.875rem;
    }

    .likes-card {
      border-radius: 0.75rem;
      background: linear-gradient(to bottom right, rgba(153, 27, 27, 0.4), rgba(153, 27, 27, 0.3));
      padding: 1rem;
      border: 1px solid rgba(220, 38, 38, 0.4);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .likes-value {
      font-size: 1.875rem;
      font-weight: 900;
      color: white;
    }

    .likes-emoji {
      font-size: 2rem;
      opacity: 0.6;
    }

    /* Bottom Navigation */
    nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: linear-gradient(to top, #1a0033, rgba(45, 0, 82, 0.8));
      backdrop-filter: blur(12px);
      border-top: 1px solid rgba(168, 85, 247, 0.3);
      padding: 0.75rem 1rem;
    }

    .nav-container {
      display: flex;
      justify-content: space-around;
      max-width: 28rem;
      margin: 0 auto;
    }

    .nav-button {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.25rem;
      padding: 0.5rem 1.5rem;
      border-radius: 0.5rem;
      font-weight: 700;
      font-size: 0.75rem;
      transition: all 0.3s;
      border: none;
      cursor: pointer;
      font-family: inherit;
      background: transparent;
      color: rgba(168, 85, 247, 0.6);
    }

    .nav-button.active {
      background-color: rgba(168, 85, 247, 0.6);
      color: white;
      box-shadow: 0 0 10px rgba(168, 85, 247, 0.3);
    }

    .nav-emoji {
      font-size: 1.25rem;
    }

    .hidden {
      display: none;
    }
  </style>
</head>
<body>
  <header>
    <h1>POKOPIA DEX</h1>
    <p class="subtitle">POCKET MONSTER ENCYCLOPEDIA</p>
  </header>

  <main>
    <!-- Pokédex Tab -->
    <div id="pokedex-tab" class="tab-content">
      <div class="pokemon-grid" id="pokemon-grid"></div>
    </div>

    <!-- Habitat Tab -->
    <div id="habitat-tab" class="tab-content hidden">
      <div id="habitat-list"></div>
    </div>

    <!-- Search Tab -->
    <div id="search-tab" class="tab-content hidden">
      <div class="search-container">
        <span class="search-icon">🔍</span>
        <input 
          type="text" 
          id="search-input" 
          class="search-input" 
          placeholder="Search Pokémon..."
        >
      </div>
      <div class="pokemon-grid" id="search-results"></div>
      <div id="no-results" class="no-results hidden">No Pokémon found</div>
    </div>

    <!-- Detail Page -->
    <div id="detail-tab" class="tab-content hidden">
      <button class="back-button" onclick="showTab('pokedex-tab')">← Back</button>
      <div id="detail-content"></div>
    </div>
  </main>

  <nav>
    <div class="nav-container">
      <button class="nav-button active" onclick="switchTab('pokedex-tab')">
        <span class="nav-emoji">📖</span>
      </button>
      <button class="nav-button" onclick="switchTab('habitat-tab')">
        <span class="nav-emoji">🏞️</span>
      </button>
      <button class="nav-button" onclick="switchTab('search-tab')">
        <span class="nav-emoji">🔍</span>
      </button>
    </div>
  </nav>

  <script>
    const pokemonData = [
      {
        id: 1,
        name: 'Bulbasaur',
        type: 'Grass/Poison',
        image: '🌱',
        abilities: ['Overgrow', 'Chlorophyll'],
        likes: 487,
        habitat: 'Forest',
        description: 'A quadrupedal Pokémon with a bulb on its back. The bulb absorbs energy to grow stronger. Bulbasaur can be found in damp grasslands and forests throughout Pokopia.'
      },
      {
        id: 2,
        name: 'Charmander',
        type: 'Fire',
        image: '🔥',
        abilities: ['Blaze', 'Solar Power'],
        likes: 612,
        habitat: 'Mountain',
        description: 'A bipedal fire-type Pokémon with a flame on its tail. The flame represents its life force and grows when Charmander is healthy. Found in volcanic regions and hot springs.'
      },
      {
        id: 3,
        name: 'Squirtle',
        type: 'Water',
        image: '💧',
        abilities: ['Torrent', 'Rain Dish'],
        likes: 558,
        habitat: 'Ocean',
        description: 'An amphibious Pokémon with a protective shell. It withdraws into its shell when threatened and shoots water from its mouth. Common in coastal waters and lakes throughout Pokopia.'
      },
      {
        id: 4,
        name: 'Pikachu',
        type: 'Electric',
        image: '⚡',
        abilities: ['Static', 'Lightning Rod'],
        likes: 1247,
        habitat: 'Grassland',
        description: 'An iconic yellow rodent Pokémon that stores electricity in its cheeks. Pikachu discharges powerful bolts to stun opponents and is extremely popular in Pokopia.'
      },
      {
        id: 5,
        name: 'Eevee',
        type: 'Normal',
        image: '🐿️',
        abilities: ['Run Away', 'Adaptability'],
        likes: 891,
        habitat: 'Forest',
        description: 'A small brown quadruped Pokémon with exceptional evolutionary potential. Eevee\'s body can adapt to different environments, allowing it to evolve into various forms. Found throughout Pokopia\'s forests and grasslands.'
      }
    ];

    const habitats = [
      { name: 'Forest', pokemon: ['Bulbasaur', 'Eevee'] },
      { name: 'Mountain', pokemon: ['Charmander'] },
      { name: 'Ocean', pokemon: ['Squirtle'] },
      { name: 'Grassland', pokemon: ['Pikachu'] }
    ];

    const typeColors = {
      'Fire': '#FF6B35',
      'Water': '#004E89',
      'Grass': '#2A9D8F',
      'Electric': '#FFD60A',
      'Psychic': '#D946EF',
      'Dragon': '#7209B7',
      'Ghost': '#A64DFF',
      'Normal': '#8B7355',
      'Poison': '#9D4EDD',
      'Flying': '#3A86FF',
      'Fairy': '#FF006E'
    };

    function getTypeColor(type) {
      return typeColors[type.split('/')[0]] || '#6366F1';
    }

    function createPokemonCard(pokemon, onclick) {
      const card = document.createElement('button');
      card.className = 'pokemon-card';
      card.onclick = onclick;
      
      const types = pokemon.type.split('/').map(t => `
        <span class="type-badge" style="color: ${getTypeColor(t)}; background-color: ${getTypeColor(t)}40">${t}</span>
      `).join('');
      
      card.innerHTML = `
        <div class="pokemon-image">${pokemon.image}</div>
        <div class="pokemon-name">${pokemon.name}</div>
        <div class="type-badges">${types}</div>
        <div class="likes"><span>❤️</span> ${pokemon.likes.toLocaleString()}</div>
      `;
      
      return card;
    }

    function renderPokédex() {
      const grid = document.getElementById('pokemon-grid');
      grid.innerHTML = '';
      pokemonData.forEach(pokemon => {
        grid.appendChild(createPokemonCard(pokemon, () => showPokemonDetail(pokemon)));
      });
    }

    function renderHabitats() {
      const list = document.getElementById('habitat-list');
      list.innerHTML = '';
      habitats.forEach(habitat => {
        const card = document.createElement('button');
        card.className = 'habitat-card';
        const pokemon = pokemonData.find(p => p.name === habitat.pokemon[0]);
        card.onclick = () => showPokemonDetail(pokemon);
        
        const pokemonList = habitat.pokemon.map(name => {
          const poke = pokemonData.find(p => p.name === name);
          return `<span class="pokemon-item"><span class="pokemon-item-emoji">${poke.image}</span>${name}</span>`;
        }).join('');
        
        card.innerHTML = `
          <div class="habitat-name">📍 ${habitat.name}</div>
          <div class="habitat-pokemon">${pokemonList}</div>
        `;
        
        list.appendChild(card);
      });
    }

    function renderSearch(query) {
      const results = document.getElementById('search-results');
      const noResults = document.getElementById('no-results');
      
      let filtered = pokemonData;
      if (query.trim()) {
        filtered = pokemonData.filter(p => p.name.toLowerCase().includes(query.toLowerCase()));
      }
      
      results.innerHTML = '';
      if (filtered.length === 0) {
        noResults.classList.remove('hidden');
      } else {
        noResults.classList.add('hidden');
        filtered.forEach(pokemon => {
          results.appendChild(createPokemonCard(pokemon, () => showPokemonDetail(pokemon)));
        });
      }
    }

    function showPokemonDetail(pokemon) {
      const types = pokemon.type.split('/').map(t => `
        <span class="type-badge" style="color: ${getTypeColor(t)}; background-color: ${getTypeColor(t)}60">${t}</span>
      `).join('');
      
      const abilities = pokemon.abilities.map(a => `
        <div class="ability-item">
          <span class="ability-emoji">⚡</span>
          <span class="ability-name">${a}</span>
        </div>
      `).join('');
      
      const content = document.getElementById('detail-content');
      content.innerHTML = `
        <div class="detail-image">
          <div class="detail-emoji">${pokemon.image}</div>
          <div class="detail-name">${pokemon.name}</div>
          <div class="detail-description">${pokemon.description}</div>
        </div>
        
        <div class="stats-grid">
          <div class="stat-card">
            <div class="stat-label">Type</div>
            <div class="type-badges">${types}</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">Habitat</div>
            <div class="stat-content">
              <span>📍</span>
              <span class="stat-value">${pokemon.habitat}</span>
            </div>
          </div>
        </div>
        
        <div class="abilities-card">
          <div class="stat-label">Abilities</div>
          ${abilities}
        </div>
        
        <div class="likes-card">
          <div>
            <div class="stat-label">Popularity</div>
            <div class="likes-value">${pokemon.likes.toLocaleString()}</div>
          </div>
          <div class="likes-emoji">❤️</div>
        </div>
      `;
      
      showTab('detail-tab');
    }

    function switchTab(tabId) {
      showTab(tabId);
      document.querySelectorAll('.nav-button').forEach(btn => btn.classList.remove('active'));
      event.target.closest('.nav-button').classList.add('active');
    }

    function showTab(tabId) {
      document.querySelectorAll('.tab-content').forEach(tab => tab.classList.add('hidden'));
      document.getElementById(tabId).classList.remove('hidden');
    }

    document.getElementById('search-input').addEventListener('input', (e) => {
      renderSearch(e.target.value);
    });

    // Initialize
    renderPokédex();
    renderHabitats();
  </script>
</body>
</html>
