<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pokopia Dex</title>
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/react.min.js"></script>
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/react-dom.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue', sans-serif;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useMemo } = React;

    function PokopialDex() {
      const [activeTab, setActiveTab] = useState('pokedex');
      const [selectedPokemon, setSelectedPokemon] = useState(null);
      const [searchQuery, setSearchQuery] = useState('');

      const pokemonData = [
        {
          id: 1,
          name: 'Bulbasaur',
          type: 'Grass/Poison',
          image: '🌱',
          abilities: ['Overgrow', 'Chlorophyll'],
          likes: 487,
          habitat: 'Forest',
          description: 'A quadrupedal Pokémon with a bulb on its back. The bulb absorbs energy to grow stronger. Bulbasaur can be found in damp grasslands and forests throughout Pokopia.'
        },
        {
          id: 2,
          name: 'Charmander',
          type: 'Fire',
          image: '🔥',
          abilities: ['Blaze', 'Solar Power'],
          likes: 612,
          habitat: 'Mountain',
          description: 'A bipedal fire-type Pokémon with a flame on its tail. The flame represents its life force and grows when Charmander is healthy. Found in volcanic regions and hot springs.'
        },
        {
          id: 3,
          name: 'Squirtle',
          type: 'Water',
          image: '💧',
          abilities: ['Torrent', 'Rain Dish'],
          likes: 558,
          habitat: 'Ocean',
          description: 'An amphibious Pokémon with a protective shell. It withdraws into its shell when threatened and shoots water from its mouth. Common in coastal waters and lakes throughout Pokopia.'
        },
        {
          id: 4,
          name: 'Pikachu',
          type: 'Electric',
          image: '⚡',
          abilities: ['Static', 'Lightning Rod'],
          likes: 1247,
          habitat: 'Grassland',
          description: 'An iconic yellow rodent Pokémon that stores electricity in its cheeks. Pikachu discharges powerful bolts to stun opponents and is extremely popular in Pokopia.'
        },
        {
          id: 5,
          name: 'Eevee',
          type: 'Normal',
          image: '🐿️',
          abilities: ['Run Away', 'Adaptability'],
          likes: 891,
          habitat: 'Forest',
          description: 'A small brown quadruped Pokémon with exceptional evolutionary potential. Eevee\'s body can adapt to different environments, allowing it to evolve into various forms. Found throughout Pokopia\'s forests and grasslands.'
        }
      ];

      const habitats = [
        { name: 'Forest', pokemon: ['Bulbasaur', 'Eevee'] },
        { name: 'Mountain', pokemon: ['Charmander'] },
        { name: 'Ocean', pokemon: ['Squirtle'] },
        { name: 'Grassland', pokemon: ['Pikachu'] }
      ];

      const getTypeColor = (type) => {
        const colors = {
          'Fire': '#FF6B35',
          'Water': '#004E89',
          'Grass': '#2A9D8F',
          'Electric': '#FFD60A',
          'Psychic': '#D946EF',
          'Dragon': '#7209B7',
          'Ghost': '#A64DFF',
          'Normal': '#8B7355',
          'Poison': '#9D4EDD',
          'Flying': '#3A86FF',
          'Fairy': '#FF006E'
        };
        return colors[type.split('/')[0]] || '#6366F1';
      };

      const filteredPokemon = useMemo(() => {
        if (!searchQuery.trim()) return pokemonData;
        return pokemonData.filter(p =>
          p.name.toLowerCase().includes(searchQuery.toLowerCase())
        );
      }, [searchQuery]);

      return (
        <div style={{
          minHeight: '100vh',
          background: 'linear-gradient(to bottom, #1a0033, #2d0052, #1a0033)',
          paddingBottom: '120px'
        }}>
          {/* Header */}
          <header style={{
            position: 'sticky',
            top: 0,
            zIndex: 40,
            background: 'linear-gradient(to bottom, #2d0052, transparent)',
            paddingBottom: '1rem',
            paddingTop: '1.5rem',
            paddingLeft: '1rem',
            paddingRight: '1rem',
            borderBottom: '1px solid rgba(168, 85, 247, 0.3)'
          }}>
            <h1 style={{
              fontSize: '1.875rem',
              fontWeight: '900',
              textAlign: 'center',
              letterSpacing: '0.125em',
              background: 'linear-gradient(135deg, #FF006E, #FFD60A, #3A86FF)',
              backgroundClip: 'text',
              WebkitBackgroundClip: 'text',
              WebkitTextFillColor: 'transparent',
              color: 'transparent'
            }}>
              POKOPIA DEX
            </h1>
            <p style={{
              color: 'rgba(196, 181, 253, 0.6)',
              textAlign: 'center',
              fontSize: '0.75rem',
              marginTop: '0.25rem',
              fontWeight: '500',
              letterSpacing: '0.1em'
            }}>
              POCKET MONSTER ENCYCLOPEDIA
            </p>
          </header>

          {/* Main Content */}
          <main style={{ paddingLeft: '1rem', paddingRight: '1rem', paddingTop: '1rem' }}>
            {/* Pokédex Tab */}
            {activeTab === 'pokedex' && !selectedPokemon && (
              <div style={{
                display: 'grid',
                gridTemplateColumns: 'repeat(2, 1fr)',
                gap: '1rem',
                animation: 'fadeIn 0.3s ease-out'
              }}>
                {pokemonData.map((pokemon) => (
                  <button
                    key={pokemon.id}
                    onClick={() => setSelectedPokemon(pokemon)}
                    style={{
                      position: 'relative',
                      overflow: 'hidden',
                      borderRadius: '0.75rem',
                      background: 'linear-gradient(to bottom right, rgba(168, 85, 247, 0.4), rgba(79, 70, 229, 0.4))',
                      padding: '1rem',
                      border: '1px solid rgba(168, 85, 247, 0.4)',
                      transition: 'all 0.3s',
                      cursor: 'pointer',
                      boxShadow: '0 0 0 rgba(0, 0, 0, 0)',
                      transform: 'scale(1)',
                      fontFamily: 'inherit'
                    }}
                    onMouseEnter={(e) => {
                      e.target.style.borderColor = 'rgba(168, 85, 247, 0.6)';
                      e.target.style.boxShadow = '0 20px 25px -5px rgba(168, 85, 247, 0.2)';
                    }}
                    onMouseLeave={(e) => {
                      e.target.style.borderColor = 'rgba(168, 85, 247, 0.4)';
                      e.target.style.boxShadow = '0 0 0 rgba(0, 0, 0, 0)';
                    }}
                    onMouseDown={(e) => {
                      e.target.style.transform = 'scale(0.95)';
                    }}
                    onMouseUp={(e) => {
                      e.target.style.transform = 'scale(1)';
                    }}
                  >
                    <div style={{ position: 'relative', zIndex: 10, display: 'flex', flexDirection: 'column', gap: '0.5rem' }}>
                      <div style={{
                        fontSize: '3.5rem',
                        height: '4rem',
                        display: 'flex',
                        alignItems: 'center',
                        justifyContent: 'center'
                      }}>
                        {pokemon.image}
                      </div>
                      <h3 style={{
                        fontWeight: '900',
                        fontSize: '0.875rem',
                        color: 'white',
                        overflow: 'hidden',
                        textOverflow: 'ellipsis',
                        whiteSpace: 'nowrap'
                      }}>
                        {pokemon.name}
                      </h3>
                      <div style={{ display: 'flex', flexWrap: 'wrap', gap: '0.25rem' }}>
                        {pokemon.type.split('/').map((t) => (
                          <span
                            key={t}
                            style={{
                              fontSize: '0.75rem',
                              fontWeight: '700',
                              padding: '0.5rem',
                              borderRadius: '9999px',
                              color: getTypeColor(t),
                              backgroundColor: getTypeColor(t) + '40'
                            }}
                          >
                            {t}
                          </span>
                        ))}
                      </div>
                      <div style={{ display: 'flex', alignItems: 'center', gap: '0.25rem', color: 'rgba(196, 181, 253, 0.8)', fontSize: '0.75rem', fontWeight: '600' }}>
                        <span style={{ color: '#f87171' }}>❤️</span>
                        {pokemon.likes.toLocaleString()}
                      </div>
                    </div>
                  </button>
                ))}
              </div>
            )}

            {/* Habitat Dex Tab */}
            {activeTab === 'habitat' && !selectedPokemon && (
              <div style={{ display: 'flex', flexDirection: 'column', gap: '0.75rem', animation: 'fadeIn 0.3s ease-out' }}>
                {habitats.map((habitat) => (
                  <button
                    key={habitat.name}
                    onClick={() => {
                      const pokemon = pokemonData.find(p => p.name === habitat.pokemon[0]);
                      if (pokemon) setSelectedPokemon(pokemon);
                    }}
                    style={{
                      width: '100%',
                      position: 'relative',
                      overflow: 'hidden',
                      borderRadius: '0.5rem',
                      background: 'linear-gradient(to right, rgba(168, 85, 247, 0.3), rgba(79, 70, 229, 0.3))',
                      padding: '1rem',
                      border: '1px solid rgba(168, 85, 247, 0.4)',
                      transition: 'all 0.3s',
                      cursor: 'pointer',
                      textAlign: 'left',
                      fontFamily: 'inherit'
                    }}
                    onMouseEnter={(e) => {
                      e.currentTarget.style.borderColor = 'rgba(168, 85, 247, 0.6)';
                      e.currentTarget.style.boxShadow = '0 10px 15px -3px rgba(168, 85, 247, 0.2)';
                    }}
                    onMouseLeave={(e) => {
                      e.currentTarget.style.borderColor = 'rgba(168, 85, 247, 0.4)';
                      e.currentTarget.style.boxShadow = 'none';
                    }}
                  >
                    <div style={{ position: 'relative', zIndex: 10, display: 'flex', flexDirection: 'column', gap: '0.5rem' }}>
                      <div style={{ display: 'flex', alignItems: 'center', gap: '0.5rem' }}>
                        <span style={{ color: 'rgb(168, 85, 247)' }}>📍</span>
                        <h3 style={{
                          fontWeight: '900',
                          fontSize: '1.125rem',
                          color: 'white'
                        }}>
                          {habitat.name}
                        </h3>
                      </div>
                      <div style={{ display: 'flex', flexWrap: 'wrap', gap: '0.5rem', marginLeft: '1.5rem' }}>
                        {habitat.pokemon.map((pokeName) => {
                          const poke = pokemonData.find(p => p.name === pokeName);
                          return (
                            <span key={pokeName} style={{ fontSize: '0.875rem', fontWeight: '600', color: 'rgba(196, 181, 253, 0.9)', display: 'flex', alignItems: 'center', gap: '0.25rem' }}>
                              <span style={{ fontSize: '1.5rem' }}>{poke?.image}</span>
                              {pokeName}
                            </span>
                          );
                        })}
                      </div>
                    </div>
                  </button>
                ))}
              </div>
            )}

            {/* Search Tab */}
            {activeTab === 'search' && !selectedPokemon && (
              <div style={{ display: 'flex', flexDirection: 'column', gap: '1rem', animation: 'fadeIn 0.3s ease-out' }}>
                <div style={{ position: 'relative' }}>
                  <span style={{
                    position: 'absolute',
                    left: '0.75rem',
                    top: '50%',
                    transform: 'translateY(-50%)',
                    color: 'rgb(168, 85, 247)',
                    fontSize: '1.25rem'
                  }}>🔍</span>
                  <input
                    type="text"
                    placeholder="Search Pokémon..."
                    value={searchQuery}
                    onChange={(e) => setSearchQuery(e.target.value)}
                    style={{
                      width: '100%',
                      paddingLeft: '2.5rem',
                      paddingRight: '1rem',
                      paddingTop: '0.75rem',
                      paddingBottom: '0.75rem',
                      borderRadius: '0.5rem',
                      backgroundColor: 'rgba(168, 85, 247, 0.4)',
                      border: '1px solid rgba(168, 85, 247, 0.4)',
                      color: 'white',
                      fontSize: '1rem',
                      fontFamily: 'inherit',
                      outline: 'none',
                      transition: 'all 0.2s'
                    }}
                    onFocus={(e) => {
                      e.target.style.borderColor = 'rgba(168, 85, 247, 0.8)';
                      e.target.style.boxShadow = '0 0 0 2px rgba(168, 85, 247, 0.2)';
                    }}
                    onBlur={(e) => {
                      e.target.style.borderColor = 'rgba(168, 85, 247, 0.4)';
                      e.target.style.boxShadow = 'none';
                    }}
                  />
                </div>

                {filteredPokemon.length > 0 ? (
                  <div style={{
                    display: 'grid',
                    gridTemplateColumns: 'repeat(2, 1fr)',
                    gap: '1rem'
                  }}>
                    {filteredPokemon.map((pokemon) => (
                      <button
                        key={pokemon.id}
                        onClick={() => setSelectedPokemon(pokemon)}
                        style={{
                          position: 'relative',
                          overflow: 'hidden',
                          borderRadius: '0.75rem',
                          background: 'linear-gradient(to bottom right, rgba(168, 85, 247, 0.4), rgba(79, 70, 229, 0.4))',
                          padding: '1rem',
                          border: '1px solid rgba(168, 85, 247, 0.4)',
                          transition: 'all 0.3s',
                          cursor: 'pointer',
                          fontFamily: 'inherit'
                        }}
                        onMouseEnter={(e) => {
                          e.target.style.borderColor = 'rgba(168, 85, 247, 0.6)';
                          e.target.style.boxShadow = '0 20px 25px -5px rgba(168, 85, 247, 0.2)';
                        }}
                        onMouseLeave={(e) => {
                          e.target.style.borderColor = 'rgba(168, 85, 247, 0.4)';
                          e.target.style.boxShadow = '0 0 0 rgba(0, 0, 0, 0)';
                        }}
                      >
                        <div style={{ position: 'relative', zIndex: 10, display: 'flex', flexDirection: 'column', gap: '0.5rem' }}>
                          <div style={{
                            fontSize: '3.5rem',
                            height: '4rem',
                            display: 'flex',
                            alignItems: 'center',
                            justifyContent: 'center'
                          }}>
                            {pokemon.image}
                          </div>
                          <h3 style={{
                            fontWeight: '900',
                            fontSize: '0.875rem',
                            color: 'white',
                            overflow: 'hidden',
                            textOverflow: 'ellipsis',
                            whiteSpace: 'nowrap'
                          }}>
                            {pokemon.name}
                          </h3>
                          <div style={{ display: 'flex', flexWrap: 'wrap', gap: '0.25rem' }}>
                            {pokemon.type.split('/').map((t) => (
                              <span
                                key={t}
                                style={{
                                  fontSize: '0.75rem',
                                  fontWeight: '700',
                                  padding: '0.5rem',
                                  borderRadius: '9999px',
                                  color: getTypeColor(t),
                                  backgroundColor: getTypeColor(t) + '40'
                                }}
                              >
                                {t}
                              </span>
                            ))}
                          </div>
                        </div>
                      </button>
                    ))}
                  </div>
                ) : (
                  <div style={{ textAlign: 'center', paddingTop: '3rem' }}>
                    <p style={{ color: 'rgba(196, 181, 253, 0.6)', fontWeight: '600' }}>No Pokémon found</p>
                  </div>
                )}
              </div>
            )}

            {/* Detail Page */}
            {selectedPokemon && (
              <div style={{ animation: 'fadeIn 0.3s ease-out', display: 'flex', flexDirection: 'column', gap: '1rem' }}>
                <button
                  onClick={() => setSelectedPokemon(null)}
                  style={{
                    color: 'rgb(168, 85, 247)',
                    backgroundColor: 'transparent',
                    border: 'none',
                    fontWeight: '600',
                    fontSize: '0.875rem',
                    cursor: 'pointer',
                    textAlign: 'left',
                    padding: 0,
                    fontFamily: 'inherit',
                    transition: 'color 0.2s'
                  }}
                  onMouseEnter={(e) => e.target.style.color = 'rgb(196, 181, 253)'}
                  onMouseLeave={(e) => e.target.style.color = 'rgb(168, 85, 247)'}
                >
                  ← Back
                </button>

                {/* Detail Card */}
                <div style={{ display: 'flex', flexDirection: 'column', gap: '1rem' }}>
                  {/* Image Section */}
                  <div style={{
                    position: 'relative',
                    borderRadius: '1rem',
                    background: 'linear-gradient(to bottom, rgba(168, 85, 247, 0.4), rgba(79, 70, 229, 0.4))',
                    padding: '2rem',
                    border: '1px solid rgba(168, 85, 247, 0.4)',
                    overflow: 'hidden'
                  }}>
                    <div style={{ position: 'relative', zIndex: 10, textAlign: 'center' }}>
                      <div style={{ fontSize: '5.625rem', marginBottom: '1rem', filter: 'drop-shadow(0 10px 8px rgba(0, 0, 0, 0.3))' }}>
                        {selectedPokemon.image}
                      </div>
                      <h1 style={{
                        fontSize: '1.875rem',
                        fontWeight: '900',
                        color: 'white',
                        marginBottom: '0.5rem'
                      }}>
                        {selectedPokemon.name}
                      </h1>
                      <p style={{
                        color: 'rgba(196, 181, 253, 0.9)',
                        fontSize: '0.875rem',
                        lineHeight: '1.5',
                        maxWidth: '20rem',
                        margin: '0 auto'
                      }}>
                        {selectedPokemon.description}
                      </p>
                    </div>
                  </div>

                  {/* Stats Grid */}
                  <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '0.75rem' }}>
                    {/* Type */}
                    <div style={{
                      borderRadius: '0.75rem',
                      background: 'linear-gradient(to bottom right, rgba(168, 85, 247, 0.4), rgba(79, 70, 229, 0.4))',
                      padding: '1rem',
                      border: '1px solid rgba(168, 85, 247, 0.4)'
                    }}>
                      <p style={{
                        fontSize: '0.75rem',
                        fontWeight: '700',
                        color: 'rgba(196, 181, 253, 0.6)',
                        textTransform: 'uppercase',
                        letterSpacing: '0.05em',
                        marginBottom: '0.5rem'
                      }}>Type</p>
                      <div style={{ display: 'flex', flexWrap: 'wrap', gap: '0.5rem' }}>
                        {selectedPokemon.type.split('/').map((t) => (
                          <span
                            key={t}
                            style={{
                              fontSize: '0.75rem',
                              fontWeight: '700',
                              padding: '0.25rem 0.75rem',
                              borderRadius: '9999px',
                              color: getTypeColor(t),
                              backgroundColor: getTypeColor(t) + '60'
                            }}
                          >
                            {t}
                          </span>
                        ))}
                      </div>
                    </div>

                    {/* Habitat */}
                    <div style={{
                      borderRadius: '0.75rem',
                      background: 'linear-gradient(to bottom right, rgba(168, 85, 247, 0.4), rgba(79, 70, 229, 0.4))',
                      padding: '1rem',
                      border: '1px solid rgba(168, 85, 247, 0.4)'
                    }}>
                      <p style={{
                        fontSize: '0.75rem',
                        fontWeight: '700',
                        color: 'rgba(196, 181, 253, 0.6)',
                        textTransform: 'uppercase',
                        letterSpacing: '0.05em',
                        marginBottom: '0.5rem'
                      }}>Habitat</p>
                      <div style={{ display: 'flex', alignItems: 'center', gap: '0.5rem' }}>
                        <span style={{ color: 'rgb(168, 85, 247)' }}>📍</span>
                        <span style={{ color: 'white', fontWeight: '600' }}>{selectedPokemon.habitat}</span>
                      </div>
                    </div>
                  </div>

                  {/* Abilities */}
                  <div style={{
                    borderRadius: '0.75rem',
                    background: 'linear-gradient(to bottom right, rgba(168, 85, 247, 0.4), rgba(79, 70, 229, 0.4))',
                    padding: '1rem',
                    border: '1px solid rgba(168, 85, 247, 0.4)'
                  }}>
                    <p style={{
                      fontSize: '0.75rem',
                      fontWeight: '700',
                      color: 'rgba(196, 181, 253, 0.6)',
                      textTransform: 'uppercase',
                      letterSpacing: '0.05em',
                      marginBottom: '0.75rem'
                    }}>Abilities</p>
                    <div style={{ display: 'flex', flexDirection: 'column', gap: '0.5rem' }}>
                      {selectedPokemon.abilities.map((ability) => (
                        <div
                          key={ability}
                          style={{
                            display: 'flex',
                            alignItems: 'center',
                            gap: '0.5rem',
                            paddingLeft: '0.75rem',
                            paddingRight: '0.75rem',
                            paddingTop: '0.5rem',
                            paddingBottom: '0.5rem',
                            borderRadius: '0.5rem',
                            backgroundColor: 'rgba(168, 85, 247, 0.3)',
                            border: '1px solid rgba(168, 85, 247, 0.3)'
                          }}
                        >
                          <span style={{ color: '#facc15', fontSize: '0.875rem' }}>⚡</span>
                          <span style={{ color: 'white', fontWeight: '600', fontSize: '0.875rem' }}>{ability}</span>
                        </div>
                      ))}
                    </div>
                  </div>

                  {/* Likes */}
                  <div style={{
                    borderRadius: '0.75rem',
                    background: 'linear-gradient(to bottom right, rgba(153, 27, 27, 0.4), rgba(153, 27, 27, 0.3))',
                    padding: '1rem',
                    border: '1px solid rgba(220, 38, 38, 0.4)',
                    display: 'flex',
                    alignItems: 'center',
                    justifyContent: 'space-between'
                  }}>
                    <div>
                      <p style={{
                        fontSize: '0.75rem',
                        fontWeight: '700',
                        color: 'rgba(252, 165, 165, 0.6)',
                        textTransform: 'uppercase',
                        letterSpacing: '0.05em',
                        marginBottom: '0.25rem'
                      }}>Popularity</p>
                      <p style={{
                        fontSize: '1.875rem',
                        fontWeight: '900',
                        color: 'white'
                      }}>
                        {selectedPokemon.likes.toLocaleString()}
                      </p>
                    </div>
                    <div style={{ fontSize: '2rem', opacity: 0.6 }}>❤️</div>
                  </div>
                </div>
              </div>
            )}
          </main>

          {/* Bottom Navigation */}
          <nav style={{
            position: 'fixed',
            bottom: 0,
            left: 0,
            right: 0,
            background: 'linear-gradient(to top, #1a0033, rgba(45, 0, 82, 0.8))',
            backdropFilter: 'blur(12px)',
            borderTop: '1px solid rgba(168, 85, 247, 0.3)',
            paddingLeft: '1rem',
            paddingRight: '1rem',
            paddingTop: '0.75rem',
            paddingBottom: '0.75rem'
          }}>
            <div style={{ display: 'flex', justifyContent: 'space-around', maxWidth: '28rem', margin: '0 auto' }}>
              {[
                { id: 'pokedex', label: 'Pokédex', icon: '📖' },
                { id: 'habitat', label: 'Habitat', icon: '🏞️' },
                { id: 'search', label: 'Search', icon: '🔍' }
              ].map(tab => (
                <button
                  key={tab.id}
                  onClick={() => {
                    setActiveTab(tab.id);
                    setSelectedPokemon(null);
                    setSearchQuery('');
                  }}
                  style={{
                    display: 'flex',
                    flexDirection: 'column',
                    alignItems: 'center',
                    gap: '0.25rem',
                    paddingLeft: '1.5rem',
                    paddingRight: '1.5rem',
                    paddingTop: '0.5rem',
                    paddingBottom: '0.5rem',
                    borderRadius: '0.5rem',
                    fontWeight: '700',
                    fontSize: '0.75rem',
                    transition: 'all 0.3s',
                    border: 'none',
                    cursor: 'pointer',
                    backgroundColor: activeTab === tab.id ? 'rgba(168, 85, 247, 0.6)' : 'transparent',
                    color: activeTab === tab.id ? 'white' : 'rgba(168, 85, 247, 0.6)',
                    boxShadow: activeTab === tab.id ? '0 0 10px rgba(168, 85, 247, 0.3)' : 'none',
                    fontFamily: 'inherit'
                  }}
                >
                  <span style={{ fontSize: '1.25rem' }}>{tab.icon}</span>
                </button>
              ))}
            </div>
          </nav>

          <style>{`
